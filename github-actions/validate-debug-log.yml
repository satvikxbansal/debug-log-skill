# validate-debug-log.yml
#
# Drop this into your project at `.github/workflows/validate-debug-log.yml`.
# It validates every entry in DEBUG_LOG.md against the v2.0 11-field template
# and enforces: sequence integrity, required-field completeness, closed
# vocabularies (severity + root cause category), tag discipline (1-2 track
# tags + at least one semantic tag), the [OBSOLETE] / Supersedes DL-NNN
# handshake, and placeholder-sentinel rejection (scaffolded stubs cannot
# pass lint).
#
# It does NOT enforce "every bug fix has a DL entry" — that check would
# require distinguishing bug-fix PRs from feature PRs heuristically, which is
# noisy. Use a PR template checkbox or a `DEBUG_LOG touched?` label for that.
#
# Companion files — copy ALL THREE into .github/scripts/ alongside this
# workflow. Missing any one breaks the import chain at startup:
#   - github-actions/validate_debug_log.py
#   - scripts/debug_log_schema.py    (vocabulary constants + regex)
#   - scripts/debug_log_parser.py    (entry parsing — imports the schema)

name: Validate DEBUG_LOG.md

on:
  pull_request:
    paths:
      - "DEBUG_LOG.md"
      - ".github/workflows/validate-debug-log.yml"
      - ".github/scripts/validate_debug_log.py"
      - ".github/scripts/debug_log_schema.py"
      - ".github/scripts/debug_log_parser.py"
  push:
    branches: [main]
    paths:
      - "DEBUG_LOG.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate DEBUG_LOG.md structure
        run: |
          python3 .github/scripts/validate_debug_log.py DEBUG_LOG.md
